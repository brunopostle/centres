name: Build Windows Installer

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[gui]"
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller centres-gui.spec

      - name: Install InnoSetup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '& "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe" centres-gui.iss'
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: centres-gui-windows-installer
          path: installer\centres-gui-setup.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: installer\centres-gui-setup.exe

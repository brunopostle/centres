name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Create a GitHub Release with this tag (e.g. v0.1.0). Leave empty to build the installer only."
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ".[gui]"
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller centres-gui.spec

      - name: Install InnoSetup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: '"%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" centres-gui.iss'
        shell: cmd

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: centres-gui-windows-installer
          path: installer\centres-gui-setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: installer\centres-gui-setup.exe
          generate_release_notes: true
